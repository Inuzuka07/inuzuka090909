<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スイカゲーム（安定版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
margin:0;
background:#222;
text-align:center;
color:white;
font-family:sans-serif;
}
canvas{
background:#f5e6b3;
border:4px solid #333;
}
</style>
</head>
<body>

<h2>🍉 スイカゲーム（安定版）</h2>
<p>クリックで落とす</p>

<canvas id="game" width="400" height="600"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let fruits=[]
let nextX=200
let score=0
let nextType=randType()
let dropCooldown=0

const types=[
{r:12,c:"#ff4d4d"},
{r:16,c:"#ff9933"},
{r:20,c:"#ffee66"},
{r:25,c:"#66cc66"},
{r:30,c:"#66ccff"},
{r:35,c:"#9966ff"},
{r:42,c:"#ff66cc"},
{r:55,c:"#00aa00"}
]

function randType(){
return Math.floor(Math.random()*3)
}

class Fruit{
constructor(x,y,type){
this.x=x
this.y=y
this.vx=0
this.vy=0
this.type=type
this.r=types[type].r
this.color=types[type].c
this.safeTime=30 // これが重要（即死防止）
}
}

canvas.addEventListener("mousemove",e=>{
const rect=canvas.getBoundingClientRect()
nextX=e.clientX-rect.left
})

canvas.addEventListener("click",()=>{
if(dropCooldown>0)return

let r=types[nextType].r
let x=Math.max(r,Math.min(400-r,nextX))

fruits.push(new Fruit(x,50,nextType))

nextType=randType()
dropCooldown=20
})

function update(){

dropCooldown--

fruits.forEach(f=>{

f.safeTime--

f.vy+=0.4
f.vx*=0.98
f.vy*=0.98

f.x+=f.vx
f.y+=f.vy

// 壁
if(f.x<f.r){f.x=f.r;f.vx=0}
if(f.x>400-f.r){f.x=400-f.r;f.vx=0}

// 床
if(f.y>600-f.r){
f.y=600-f.r
f.vy=0
}

})

// 衝突
for(let i=0;i<fruits.length;i++){
for(let j=i+1;j<fruits.length;j++){

let a=fruits[i]
let b=fruits[j]

let dx=a.x-b.x
let dy=a.y-b.y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<a.r+b.r){

let overlap=a.r+b.r-dist
let nx=dx/dist
let ny=dy/dist

a.x+=nx*overlap/2
a.y+=ny*overlap/2
b.x-=nx*overlap/2
b.y-=ny*overlap/2

// 合体
if(a.type===b.type && a.type<types.length-1){

let nt=a.type+1
fruits.push(new Fruit((a.x+b.x)/2,(a.y+b.y)/2,nt))

score+=(nt+1)*10

fruits.splice(j,1)
fruits.splice(i,1)
return

}

}
}
}

}

function draw(){

ctx.clearRect(0,0,400,600)

// ライン
ctx.strokeStyle="red"
ctx.beginPath()
ctx.moveTo(0,100)
ctx.lineTo(400,100)
ctx.stroke()

// ガイド
ctx.fillStyle="rgba(0,0,0,0.2)"
let r=types[nextType].r
ctx.beginPath()
ctx.arc(nextX,50,r,0,Math.PI*2)
ctx.fill()

// ネクスト
ctx.fillStyle="black"
ctx.fillText("NEXT",300,30)
ctx.beginPath()
ctx.fillStyle=types[nextType].c
ctx.arc(350,50,r,0,Math.PI*2)
ctx.fill()

// フルーツ
fruits.forEach(f=>{
ctx.fillStyle=f.color
ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()
})

// スコア
ctx.fillStyle="black"
ctx.fillText("Score: "+score,10,30)

}

function loop(){

update()
draw()

// ゲームオーバー
for(let f of fruits){
if(f.safeTime<=0 && f.y<100){
alert("ゲームオーバー\nScore: "+score)
location.reload()
}
}

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
